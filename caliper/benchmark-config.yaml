test:
  name: dwntp-comprehensive-benchmark
  description: Comprehensive stress test profile for DWNTP chaincode including writes, reads, and capacity discovery.
  workers:
    # type: local # Unused
    number: 4
  rounds:
    - label: Warmup
      description: Warm up the network with a fixed rate of 50 TPS for 30 seconds.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/logEvent.js

    - label: Fixed-Rate-Writes-500
      description: Fixed rate of 500 TPS for 30 seconds.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: workload/logEvent.js

    - label: Fixed-Rate-Writes-1000
      description: Fixed rate of 1000 TPS for 30 seconds.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: workload/logEvent.js

    - label: Capacity-Discovery-Writes
      description: Linearly increase the transaction rate from 100 to 5000 TPS over 5 minutes to find the breaking point.
      txDuration: 300
      rateControl:
        type: linear-rate
        opts:
          startingTps: 100
          finishingTps: 5000
      workload:
        module: workload/logEvent.js

    - label: Stress-Test-Backlog
      description: Maintain a constant backlog of 500 unconfirmed transactions to test queue saturation.
      txNumber: 10000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 500
          startingTps: 100
      workload:
        module: workload/logEvent.js

    - label: Query-Performance
      description: Linearly increase read-only queries from 100 to 5000 TPS over 5 minutes to find the maximum read capacity.
      txDuration: 300
      rateControl:
        type: linear-rate
        opts:
          startingTps: 100
          finishingTps: 5000
      workload:
        module: workload/queryEvent.js

observer:
  type: local
  interval: 1
monitors:
  transaction:
    - module: prometheus
      options:
        scrapePort: 3001
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - all
        charting:
          bar:
            metrics: [all]
          polar:
            metrics: [all]
