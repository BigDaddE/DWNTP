[workspace]
members = ["crates/dwntp-events"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["DWNTP Team"]
license = "MIT"
repository = "https://github.com/BigDaddE/DWNTP"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
