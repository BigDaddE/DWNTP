version: "3.7"

networks:
  dwntp:
    name: dwntp-network

services:
  # ---------------------------------------------------------------------------
  # Orderer Node
  # ---------------------------------------------------------------------------
  orderer.dwntp.com:
    image: docker.io/hyperledger/fabric-orderer:2.5
    container_name: orderer.dwntp.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=/var/hyperledger/orderer/tls/ca.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=/var/hyperledger/orderer/tls/ca.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=/var/hyperledger/orderer/tls/ca.crt
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/genesis.block
    command: orderer
    volumes:
      - ./network/channel-artifacts/genesis.block:/var/hyperledger/orderer/genesis.block:z
      - ./network/crypto-config/ordererOrganizations/dwntp.com/orderers/orderer.dwntp.com/msp:/var/hyperledger/orderer/msp:z
      - ./network/crypto-config/ordererOrganizations/dwntp.com/orderers/orderer.dwntp.com/tls/:/var/hyperledger/orderer/tls:z
    ports:
      - "7050:7050"
    networks:
      - dwntp
    extra_hosts:
      - "peer1.org1.dwntp.com:4.3.2.1"

  # ---------------------------------------------------------------------------
  # Peer Node
  # ---------------------------------------------------------------------------
  peer0.org1.dwntp.com:
    image: docker.io/hyperledger/fabric-peer:2.5
    container_name: peer0.org1.dwntp.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org1.dwntp.com
      - CORE_PEER_ADDRESS=peer0.org1.dwntp.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.dwntp.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.dwntp.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=1.2.3.4:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # Disable local docker socket reliance for Chaincode-as-a-Service approach
      - CORE_VM_ENDPOINT=
    command: peer node start
    volumes:
      - ./network/crypto-config/peerOrganizations/org1.dwntp.com/peers/peer0.org1.dwntp.com/msp:/etc/hyperledger/fabric/msp:z
      - ./network/crypto-config/peerOrganizations/org1.dwntp.com/peers/peer0.org1.dwntp.com/tls:/etc/hyperledger/fabric/tls:z
    ports:
      - "7051:7051"
      - "7052:7052"
    networks:
      - dwntp
    extra_hosts:
      - "peer1.org1.dwntp.com:4.3.2.1"

  # ---------------------------------------------------------------------------
  # CLI Container for interacting with the Peer/Orderer (Channel Creation, etc.)
  # ---------------------------------------------------------------------------
  cli:
    container_name: cli
    image: docker.io/hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.org1.dwntp.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dwntp.com/peers/peer0.org1.dwntp.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dwntp.com/peers/peer0.org1.dwntp.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dwntp.com/peers/peer0.org1.dwntp.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dwntp.com/users/Admin@org1.dwntp.com/msp
    command: /bin/bash
    volumes:
      - ./network/crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto:z
      - ./network/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts:z
    depends_on:
      - peer0.org1.dwntp.com
      - orderer.dwntp.com
    networks:
      - dwntp
    extra_hosts:
      - "peer1.org1.dwntp.com:4.3.2.1"
